<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Papas y Alitas - Menú</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        
        #background-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: -1;
            object-fit: cover;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }
        
        .content {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
        }
        
        .logo {
            max-width: 280px;
            width: 90%;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.6));
        }
        
        .top-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 3;
        }
        
        .nav-button {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid #fff;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        
        .nav-button:hover {
            background: #e30613;
            transform: scale(1.05);
            border-color: #e30613;
        }
        
        .whatsapp-btn {
            background: #25D366;
            border-color: #25D366;
        }
        
        .whatsapp-btn:hover {
            background: #1eb34f;
        }
        
        .main-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding-bottom: 60px;
        }
        
        .btn {
            background: #e30613;
            color: white;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 6px 15px rgba(227, 6, 19, 0.4);
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(227, 6, 19, 0.6);
        }
        
        footer {
            text-align: center;
            font-size: 14px;
            opacity: 0.9;
            padding-bottom: 15px;
        }
        
        @media (max-width: 480px) {
            .logo { max-width: 220px; }
            .btn { font-size: 19px; padding: 16px 40px; }
        }
    </style>
</head>
<body>
    <!-- Video de fondo -->
    <video id="background-video" autoplay loop muted playsinline>
        <source src="fon.mp4" type="video/mp4">
        Tu navegador no soporta videos.
    </video>
    
    <div class="overlay"></div>
    
    <!-- Barra superior -->
    <div class="top-nav">
        <!-- Instagram -->
        <a href="https://www.instagram.com/hotpapastrc" target="_blank" class="nav-button">
            <img src="ig.png" alt="Instagram" width="28" height="28" style="border-radius: 6px;">
        </a>
        
        <!-- WhatsApp con tel.png -->
        <a href="https://wa.me/528715021688?text=HOLA%20TE%20VI%20EN%20EL%20MENU%20DE%20EASYTAP%20QUISIERA%20ORDENAR" 
           target="_blank" 
           class="nav-button whatsapp-btn">
            <img src="tel.png" alt="WhatsApp" width="28" height="28">
        </a>
    </div>
    
    <div class="content">
        <!-- Logo centrado arriba -->
        <header>
            <img src="log.png" alt="Hot Papas y Alitas" class="logo">
        </header>
        
        <!-- Botones principales -->
        <div class="main-buttons">
            <a href="menu.html" class="btn">VER MENÚ</a>
            <a href="https://share.google/6dKE2ZMsr09AT3BXh" target="_blank" class="btn">RECOMIÉNDANOS</a>
        </div>
        
        <footer>
            © 2019 - Hot Papas y Alitas TRC • Todos los derechos reservados
        </footer>
    </div>

    <script>
        const video = document.getElementById('background-video');
        video.addEventListener('ended', () => {
            video.currentTime = 0;
            video.play();
        });
    </script>
</body>
</html>

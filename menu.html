<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Hot Papas y Alitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap');
        
        html, body {
            font-family: 'Poppins', sans-serif;
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
        }

        .logo-font {
            font-family: 'Playfair Display', serif;
        }

        .category-card {
            opacity: 0;
            transform: translateY(80px);
            transition: all 0.8s ease-out;
            border-radius: 1.75rem;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            height: 240px;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .category-card.appear {
            opacity: 1;
            transform: translateY(0);
        }

        .category-card:hover {
            transform: scale(1.04) translateY(-8px);
            box-shadow: 0 25px 50px rgba(227, 6, 19, 0.6);
        }

        .category-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.85));
            display: flex;
            align-items: flex-end;
            padding: 2rem;
        }

        .modal {
            background-image: url('fon.png');
            background-size: cover;
            background-position: center;
        }

        .modal-content {
            background: rgba(20, 20, 20, 0.96);
            backdrop-filter: blur(12px);
        }

        .item {
            transition: all 0.3s;
        }
        .item:hover {
            background-color: rgba(227, 6, 19, 0.25);
        }
    </style>
</head>
<body class="overflow-x-hidden">

<header class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/10">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-white hover:text-red-400 transition-colors">
            <img src="flecha.png" alt="Volver" class="w-10 h-10">
        </a>
        <img src="log.png" alt="Hot Papas y Alitas" class="h-16 w-auto">
        <div class="w-10"></div>
    </div>
</header>

<main class="pt-24 pb-16 px-4 sm:px-6 max-w-5xl mx-auto">
    <h1 class="logo-font text-5xl sm:text-6xl font-bold text-center mb-12 tracking-wider text-red-500">
        MENÚ
    </h1>

    <div class="space-y-6 sm:space-y-8" id="categories"></div>
</main>

<!-- Modal -->
<div id="modal" class="modal fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="modal-content rounded-3xl w-full max-w-2xl max-h-[92vh] overflow-y-auto relative border border-red-500/30 shadow-2xl">
        <button onclick="closeModal()" 
                class="absolute top-4 right-4 text-5xl text-white/80 hover:text-white z-20 transition">×</button>
        <div class="p-8 sm:p-10" id="modal-content"></div>
    </div>
</div>

<script>
    const sections = [
        { id: "entradas", title: "ENTRADAS", img: "entradas.png" },
        { id: "conos", title: "CONOS", img: "conos.png" },
        { id: "combos", title: "COMBOS", img: "combos.png" },
        { id: "alitas", title: "ALITAS Y BONELESS", img: "alitas.png" },
        { id: "hamburguesas", title: "HAMBURGUESAS", img: "hamburguesas.png" },
        { id: "compartir", title: "PA' QUE COMPARTAS", img: "compartir.png" },
        { id: "bebidas", title: "BEBIDAS", img: "bebidas.png" }
    ];

    const container = document.getElementById('categories');

    sections.forEach((sec, index) => {
        const card = document.createElement('button');
        card.className = `category-card w-full`;
        card.style.backgroundImage = `url('${sec.img}')`;
        
        card.innerHTML = `
            <div class="category-overlay">
                <h2 class="logo-font text-4xl sm:text-5xl font-bold tracking-wider text-white w-full text-center drop-shadow-lg">
                    ${sec.title}
                </h2>
            </div>
        `;
        
        card.onclick = () => openModal(sec);
        container.appendChild(card);

        setTimeout(() => card.classList.add('appear'), 80 + index * 120);
    });

    function openModal(sec) {
        const modal = document.getElementById('modal');
        const content = document.getElementById('modal-content');
        
        let html = `<h2 class="logo-font text-5xl font-bold text-center mb-10 text-red-500">${sec.title}</h2>`;

        if (sec.id === "entradas") {
            html += `
                <div class="space-y-6">
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between items-start"><span class="font-bold">PAPAS ORIGINALES</span><span class="font-bold text-xl">$80</span></div><p class="text-sm opacity-90 mt-1">300gr de papas fritas. Elige salsa y aderezo.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between items-start"><span class="font-bold">ELOTES DULCES</span><span class="font-bold text-xl">$99</span></div><p class="text-sm opacity-90 mt-1">3 elotes medianos dulces acompañados de 120gr de papas fritas.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between items-start"><span class="font-bold">SALCHIPAPAS</span><span class="font-bold text-xl">$90</span></div><p class="text-sm opacity-90 mt-1">300 gr de papas fritas acompañadas de 4 tiras de salchicha asada.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between items-start"><span class="font-bold">DEDOS DE QUESO</span><span class="font-bold text-xl">$99</span></div><p class="text-sm opacity-90 mt-1">4 dedos de queso acompañados de 120 gr de papas fritas.</p></div>
                </div>`;
        } 
        else if (sec.id === "conos") {
            html += `
                <div class="space-y-6">
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">HOT PAPAS BONELESS</span><span class="font-bold text-xl">$99</span></div><p class="text-sm opacity-90">6 pz boneless + 300 gr papas fritas.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">PAPALITAS</span><span class="font-bold text-xl">$99</span></div><p class="text-sm opacity-90">4 pz de alitas + 300 gr papas fritas.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">VAMPIRITO</span><span class="font-bold text-xl">$99</span></div><p class="text-sm opacity-90">200 gr carne vampiro + 300 gr papas fritas.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">CONO COREANO</span><span class="font-bold text-xl">$105</span></div><p class="text-sm opacity-90">300 gr papas + banderilla tradicional coreana.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">SALCHIBONDLES</span><span class="font-bold text-xl">$105</span></div><p class="text-sm opacity-90">6 pz boneless + trocitos salchicha + 300 gr papas.</p></div>
                </div>`;
        } 
        else if (sec.id === "combos") {
            html += `
                <div class="space-y-6">
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">MAMALÓN</span><span class="font-bold text-xl">$145</span></div><p class="text-sm opacity-90">7 alitas, 5 boneless, 200 gr papas fritas.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">VIP</span><span class="font-bold text-xl">$170</span></div><p class="text-sm opacity-90">10 pz boneless + 1 elote mediano dulce + 100 gr papas.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">COREANO</span><span class="font-bold text-xl">$160</span></div><p class="text-sm opacity-90">6 pz boneless + 1 banderilla coreana + 100 gr papas.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">SAMPLER CHINGÓN</span><span class="font-bold text-xl">$170</span></div><p class="text-sm opacity-90">5 alitas, 5 boneless, 3 dedos queso + 100 gr papas.</p></div>
                </div>`;
        } 
        else if (sec.id === "alitas") {
            html += `
                <div class="space-y-6">
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">COMBO BONELESS</span><span class="font-bold text-xl">$145</span></div><p class="text-sm opacity-90">13 pz boneless + 200 gr papas fritas.</p></div>
                    <div class="item p-5 rounded-2xl"><div class="flex justify-between"><span class="font-bold">COMBO ALITAS</span><span class="font-bold text-xl">$145</span></div><p class="text-sm opacity-90">10 pz alitas + 200 gr papas fritas.</p></div>
                </div>`;
        } 
        else if (sec.id === "hamburguesas") {
            html += `
                <div class="space-y-6">
                    <div class="item p-5 rounded-2xl">
                        <div class="flex justify-between items-start">
                            <span class="font-bold">BURGER TEXANA</span>
                            <span class="font-bold text-xl">$130</span>
                        </div>
                        <p class="text-sm opacity-90 mt-1">Pan artesanal, un toque de chipotle, tocino, cebollita empanizada, carne de sirloin, queso manchego y queso amarillo acompañado de papas fritas.</p>
                    </div>
                    
                    <div class="item p-5 rounded-2xl">
                        <div class="flex justify-between items-start">
                            <span class="font-bold">BURGER CLÁSICA</span>
                            <span class="font-bold text-xl">$125</span>
                        </div>
                        <p class="text-sm opacity-90 mt-1">Pan artesanal, carne de sirloin, queso manchego, tocino, queso amarillo y salchicha asada acompañada de papas fritas.</p>
                    </div>
                    
                    <div class="item p-5 rounded-2xl">
                        <div class="flex justify-between items-start">
                            <span class="font-bold">BURGER DE BONELESS</span>
                            <span class="font-bold text-xl">$115</span>
                        </div>
                        <p class="text-sm opacity-90 mt-1">Pan artesanal, 6pz boneless, salchicha, BBQ, queso derretido y parmesano + 150g papas.</p>
                    </div>
                    
                    <div class="item p-5 rounded-2xl">
                        <div class="flex justify-between items-start">
                            <span class="font-bold">BURGER CHESSE</span>
                            <span class="font-bold text-xl">$115</span>
                        </div>
                        <p class="text-sm opacity-90 mt-1">Pan artesanal, 6pz boneless, queso, ranch y parmesano + 150gr papas.</p>
                    </div>
                </div>`;
        } 
        else if (sec.id === "compartir") {
            html += `
                <div class="item p-8 rounded-3xl text-center bg-red-900/40 border border-red-500/30">
                    <div class="font-bold text-4xl mb-3">FAMILY BOX</div>
                    <div class="text-5xl font-bold text-red-400 mb-4">$499</div>
                    <p class="text-lg leading-relaxed">15 alitas, 15 boneless, 2 elotes dulces, 4 dedos de queso, 300 gr de papas fritas, 1 burger de pollo. Elige salsa y aderezo.</p>
                </div>`;
        } 
        else if (sec.id === "bebidas") {
            html += `
                <div class="grid grid-cols-2 gap-4">
                    <div class="item p-6 rounded-2xl text-center"><span class="font-bold block">COCA COLA</span><span class="text-2xl">$35</span><span class="text-xs block">600ml</span></div>
                    <div class="item p-6 rounded-2xl text-center"><span class="font-bold block">ARIZONA FRESA</span><span class="text-2xl">$35</span><span class="text-xs block">470ml</span></div>
                    <div class="item p-6 rounded-2xl text-center"><span class="font-bold block">ARIZONA MANGO</span><span class="text-2xl">$35</span><span class="text-xs block">470ml</span></div>
                    <div class="item p-6 rounded-2xl text-center"><span class="font-bold block">AGUA EMBOTELLADA</span><span class="text-2xl">$20</span><span class="text-xs block">500ml</span></div>
                </div>`;
        }

        content.innerHTML = html;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeModal() {
        const modal = document.getElementById('modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") closeModal();
    });
</script>
</body>
</html>
